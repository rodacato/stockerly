<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>500 - Something Went Wrong | Stockerly</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #fff;
      color: #0f172a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1923; color: #e2e8f0; }
      .hero-number { color: #1e293b !important; }
      .title { color: #f8fafc !important; }
      .description { color: #94a3b8 !important; }
      .btn-secondary { border-color: #334155 !important; color: #cbd5e1 !important; }
      .btn-secondary:hover { background: #1e293b !important; }
      .status-text { color: #475569 !important; }
      .bottom-bar { background: linear-gradient(to right, rgba(0,90,152,0.1), #005A98, rgba(0,90,152,0.1)) !important; }
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }
    .bg-decoration {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='800' height='400' viewBox='0 0 800 400' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 350L150 280L300 320L450 150L550 220L650 50L720 180M740 230L800 380' stroke='%23e5e7eb' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='730' cy='205' r='8' fill='%23e5e7eb'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.15;
    }
    .content { position: relative; z-index: 10; text-align: center; max-width: 480px; padding: 1.5rem; }
    .logo { display: flex; align-items: center; gap: 0.5rem; justify-content: center; margin-bottom: 3rem; }
    .logo-icon {
      background: #005A98; color: #fff; padding: 0.5rem;
      border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; color: #0f172a; }
    .hero { position: relative; margin-bottom: 1.5rem; user-select: none; }
    .hero-number {
      font-size: clamp(120px, 20vw, 180px); font-weight: 700; line-height: 1;
      color: #e2e8f0; letter-spacing: -0.05em;
    }
    .hero-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      padding-top: 0.5rem;
    }
    .hero-icon .material-symbols-outlined {
      font-size: clamp(4rem, 8vw, 5rem); color: #005A98; opacity: 0.9;
    }
    .title { font-size: 1.875rem; font-weight: 700; color: #0f172a; margin-bottom: 1rem; }
    .description { font-size: 1.125rem; color: #64748b; line-height: 1.6; max-width: 400px; margin: 0 auto 2.5rem; }
    .actions { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
    @media (min-width: 640px) { .actions { flex-direction: row; justify-content: center; } }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.875rem 2rem; border-radius: 0.5rem; font-size: 1rem;
      font-weight: 600; text-decoration: none; transition: all 0.15s;
      min-width: 160px; cursor: pointer; border: none;
    }
    .btn-primary { background: #005A98; color: #fff; }
    .btn-primary:hover { background: #004A80; }
    .btn-secondary {
      background: transparent; color: #475569;
      border: 2px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn .material-symbols-outlined { font-size: 1.25rem; }
    .status-text { margin-top: 4rem; font-size: 0.875rem; color: #94a3b8; }
    .status-text p + p { margin-top: 0.25rem; }
    .status-text a { color: #005A98; text-decoration: none; font-weight: 500; }
    .status-text a:hover { text-decoration: underline; }
    .status-text .mono { font-family: ui-monospace, 'SF Mono', monospace; }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(to right, rgba(0,90,152,0.1), #005A98, rgba(0,90,152,0.1));
    }
  </style>
</head>
<body>
  <div class="bg-decoration"></div>

  <div class="content">
    <div class="logo">
      <div class="logo-icon">
        <span class="material-symbols-outlined" style="font-size:1.5rem">trending_up</span>
      </div>
      <span class="logo-text">Stockerly</span>
    </div>

    <div class="hero">
      <h1 class="hero-number">500</h1>
      <div class="hero-icon">
        <span class="material-symbols-outlined">cloud_off</span>
      </div>
    </div>

    <h2 class="title">Something Went Wrong</h2>
    <p class="description">We're experiencing technical difficulties. Please try again in a few moments or return to your dashboard.</p>

    <div class="actions">
      <a href="javascript:location.reload()" class="btn btn-primary">
        <span class="material-symbols-outlined">refresh</span>
        Try Again
      </a>
      <a href="/" class="btn btn-secondary">
        <span class="material-symbols-outlined">home</span>
        Go Home
      </a>
    </div>

    <div class="status-text">
      <p>Error Code: <span class="mono">ERR_INTERNAL_SERVER_500</span></p>
      <p>Need help? <a href="mailto:support@stockerly.com">Contact Stockerly Support</a></p>
    </div>
  </div>

  <div class="bottom-bar"></div>
</body>
</html>
