---
api_key: '<%= ENV["HONEYBADGER_API_KEY"] %>'
revision: '<%= Stockerly::VERSION %>'
report_data: <%= !Rails.env.local? %>

params_filters:
  - passw
  - email
  - secret
  - token
  - _key
  - crypt
  - salt
  - certificate
  - otp
  - ssn
  - cvv
  - cvc

breadcrumbs:
  enabled: true

logging:
  path: "STDOUT"
  level: "WARN"
