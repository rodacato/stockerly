service: stockerly
image: ghcr.io/<%= ENV["GITHUB_REPOSITORY"] %>

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_ACTOR"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>
  job:
    hosts:
      - <%= ENV["HOST_IP"] %>
    cmd: bundle exec rails solid_queue:start

ssh:
  user: deploy

proxy:
  ssl: false
  host: stockerly.notdefined.dev
  app_port: 3000
  healthcheck:
    interval: 10
    path: /up
    timeout: 5

env:
  clear:
    RAILS_SERVE_STATIC_FILES: true
    RAILS_LOG_TO_STDOUT: true
    RAILS_LOG_LEVEL: warn
    DB_HOST: stockerly-postgres
    POSTGRES_USER: stockerly
    POSTGRES_DB: stockerly_production
    SOLID_QUEUE_IN_PUMA: false
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 5
  secret:
    - SECRET_KEY_BASE
    - POSTGRES_PASSWORD
    - DATABASE_URL
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - HONEYBADGER_API_KEY
    - RESEND_API_KEY

builder:
  arch: amd64
  args:
    RAILS_ENV: production
  cache:
    type: registry
    options: mode=max
    image: ghcr.io/<%= ENV["GITHUB_REPOSITORY"] %>:build-cache

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: "3"

accessories:
  postgres:
    image: postgres:16
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_USER: stockerly
        POSTGRES_DB: stockerly_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
