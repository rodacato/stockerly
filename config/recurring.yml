production:
  sync_high_priority_stocks:
    class: SyncPriorityAssetsJob
    args: [ "stock", "high" ]
    schedule: every 5 minutes

  sync_low_priority_stocks:
    class: SyncPriorityAssetsJob
    args: [ "stock", "low" ]
    schedule: every 30 minutes

  sync_all_crypto:
    class: SyncPriorityAssetsJob
    args: [ "crypto", "all" ]
    schedule: every 5 minutes

  refresh_fx_rates:
    class: RefreshFxRatesJob
    schedule: every hour at minute 30

  take_daily_snapshots:
    class: TakeSnapshotsJob
    schedule: at 11pm every day

  sync_index_history:
    class: SyncIndexHistoryJob
    schedule: "15 23 * * *"

  calculate_trend_scores:
    class: CalculateTrendScoresJob
    schedule: at 11:30pm every day

  retry_failed_assets:
    class: RetryFailedAssetsJob
    schedule: at 2am every day

  cleanup_old_logs:
    command: "SystemLog.where('created_at < ?', 90.days.ago).delete_all"
    schedule: at 2:15am every day

  refresh_fear_greed:
    class: RefreshFearGreedJob
    schedule: at 6am every day

  sync_news:
    class: SyncNewsJob
    schedule: every 30 minutes

  sync_market_indices:
    class: SyncMarketIndicesJob
    schedule: every 10 minutes

  sync_fundamentals_overview:
    class: SyncAllFundamentalsJob
    schedule: "0 7 * * 2,5"

  sync_fundamentals_statements:
    class: SyncAllStatementsJob
    schedule: "0 8 * * 0"

  sync_earnings:
    class: SyncEarningsJob
    schedule: at 9am every day

  backfill_missing_histories:
    class: BackfillMissingHistoriesJob
    schedule: "0 3 * * 0"

  sync_dividends:
    class: SyncDividendsJob
    schedule: "0 8 * * 1"

  sync_cetes:
    class: SyncCetesJob
    schedule: "0 10 * * 0"

  notify_earnings:
    class: NotifyEarningsJob
    schedule: at 7am every day

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
