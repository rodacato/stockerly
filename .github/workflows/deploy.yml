name: Deploy

on:
  push:
    branches: [ production ]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  packages: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stockerly
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: stockerly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: stockerly
      DATABASE_PASSWORD: test_password

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Run tests
        run: bundle exec rspec

      - name: Run Brakeman
        run: bin/brakeman --no-pager

      - name: Run bundler-audit
        run: bundle exec bundler-audit check --update

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      DOCKER_BUILDKIT: 1
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      HOST_IP: ${{ secrets.HOST_IP }}
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
      HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with Kamal
        run: |
          # Check if the postgres container exists (running or stopped) via SSH
          if ssh -o StrictHostKeyChecking=no deploy@$HOST_IP docker container inspect stockerly-postgres &>/dev/null; then
            bin/kamal deploy
          else
            echo "First deploy — bootstrapping with kamal setup..."
            bin/kamal setup
          fi

      - name: Notify Honeybadger of deploy
        if: success()
        run: |
          curl --silent --show-error \
            --data "deploy[environment]=production&deploy[revision]=${{ github.sha }}&deploy[repository]=${{ github.repository }}&deploy[local_username]=${{ github.actor }}&api_key=$HONEYBADGER_API_KEY" \
            https://api.honeybadger.io/v1/deploys
