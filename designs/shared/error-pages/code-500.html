<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>500 Internal Server Error | Stockerly</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004a99",
                        "background-light": "#ffffff",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .bg-broken-chart {
            background-image: url("data:image/svg+xml,%3Csvg width='800' height='400' viewBox='0 0 800 400' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 350L150 280L300 320L450 150L550 220L650 50L720 180M740 230L800 380' stroke='%23e5e7eb' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='730' cy='205' r='8' fill='%23e5e7eb'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.15;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden">
<!-- Background Decoration -->
<div class="absolute inset-0 z-0 bg-broken-chart pointer-events-none" data-alt="Abstract broken line graph background pattern"></div>
<div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12 text-center">
<!-- Stockerly Logo -->
<div class="mb-12 flex items-center gap-2">
<div class="bg-primary p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-2xl">trending_up</span>
</div>
<span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Stockerly</span>
</div>
<!-- Hero Section -->
<div class="relative">
<!-- Large 500 Number -->
<h1 class="text-[120px] md:text-[180px] font-bold leading-none text-slate-200 dark:text-slate-800 select-none">
                500
            </h1>
<!-- Cloud Icon Overlay -->
<div class="absolute inset-0 flex items-center justify-center pt-8">
<span class="material-symbols-outlined text-primary text-7xl md:text-8xl opacity-90">cloud_off</span>
</div>
</div>
<!-- Messaging -->
<div class="max-w-md mx-auto mt-6">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-4">Something Went Wrong</h2>
<p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed">
                We're experiencing technical difficulties. Please try again in a few moments or return to your dashboard.
            </p>
</div>
<!-- Actions -->
<div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4 w-full">
<button class="w-full sm:w-auto min-w-[160px] px-8 py-3.5 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg shadow-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">refresh</span>
                Try Again
            </button>
<button class="w-full sm:w-auto min-w-[160px] px-8 py-3.5 bg-transparent border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-semibold rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">home</span>
                Go Home
            </button>
</div>
<!-- Status Support -->
<div class="mt-16 text-slate-400 dark:text-slate-500 text-sm">
<p>Error Code: <span class="font-mono">ERR_INTERNAL_SERVER_500</span></p>
<p class="mt-1">Need help? <a class="text-primary hover:underline underline-offset-4" href="#">Contact Stockerly Support</a></p>
</div>
</div>
<!-- Decorative Gradient -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary/10 via-primary to-primary/10"></div>
</body></html>
