  - path: docs/screenshots/market.png
    alt: "Market listings with TrendScore and Fear & Greed Index"
  - path: docs/screenshots/portfolio.png
    alt: "Portfolio detail with allocation, returns, and risk metrics"
  - path: docs/screenshots/alerts.png
    alt: "Price alert configuration panel"
  - path: docs/screenshots/asset-detail.png
    alt: "Asset detail page with fundamentals and earnings"
  - path: docs/screenshots/news.png
    alt: "Aggregated financial news feed"
  - path: docs/screenshots/admin-integrations.png
    alt: "Admin panel with API integration health monitoring"

